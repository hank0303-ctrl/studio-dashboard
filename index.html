<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武樂教室管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #18181f;
  --surface2: #22222d;
  --border: #2e2e3d;
  --accent: #c8a96e;
  --accent2: #7c6fcd;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a72;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,19,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 4px;
  padding: 0 20px; height: 56px;
}
.nav-logo {
  font-weight: 900; font-size: 18px;
  color: var(--accent); letter-spacing: 2px;
  margin-right: 24px; white-space: nowrap;
}
.nav-btn {
  background: none; border: none; color: var(--text2);
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px; cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--surface2); color: var(--accent); }
.nav-spacer { flex: 1; }
.nav-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }

/* ── LAYOUT ── */
.page { display: none; padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
}

/* ── GRID ── */
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
@media(max-width:900px){
  .grid-4,.grid-3 { grid-template-columns: repeat(2,1fr); }
}
@media(max-width:600px){
  .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; }
  .page { padding: 16px; }
}

/* ── STAT CARD ── */
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.stat-card.gold::before { background: linear-gradient(90deg, var(--accent), #e8c990); }
.stat-card.purple::before { background: linear-gradient(90deg, var(--accent2), #a89ce0); }
.stat-card.green::before { background: linear-gradient(90deg, var(--green), #86efac); }
.stat-card.red::before { background: linear-gradient(90deg, var(--red), #fca5a5); }
.stat-num {
  font-size: 36px; font-weight: 900; line-height: 1;
  font-family: 'DM Mono', monospace; margin-bottom: 6px;
}
.stat-card.gold .stat-num { color: var(--accent); }
.stat-card.purple .stat-num { color: var(--accent2); }
.stat-card.green .stat-num { color: var(--green); }
.stat-card.red .stat-num { color: var(--red); }
.stat-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px; margin-top: 28px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); padding: 10px 14px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 11px 14px; border-bottom: 1px solid rgba(46,46,61,0.5);
  font-size: 13px; color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── BADGE ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge-green { background: rgba(74,222,128,0.12); color: var(--green); }
.badge-red { background: rgba(248,113,113,0.12); color: var(--red); }
.badge-yellow { background: rgba(251,191,36,0.12); color: var(--yellow); }
.badge-purple { background: rgba(124,111,205,0.12); color: var(--accent2); }
.badge-gold { background: rgba(200,169,110,0.12); color: var(--accent); }

/* ── PROGRESS ── */
.progress-bar {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }

/* ── FORM ── */
.form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--text3); text-transform: uppercase; }
input, select, textarea {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: inherit; font-size: 13px;
  padding: 8px 12px; outline: none;
  transition: border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent2); }
select option { background: var(--bg); }

/* ── BTN ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #1a1408; }
.btn-primary:hover { background: #ddbf7e; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover { background: rgba(248,113,113,0.25); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 6px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 999;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; max-width: 560px; width: 100%;
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--accent); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

/* ── RANK ── */
.rank-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.rank-item:last-child { border-bottom: none; }
.rank-num {
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700;
  width: 32px; text-align: center; color: var(--text3);
}
.rank-num.top1 { color: var(--accent); }
.rank-num.top2 { color: #aaa; }
.rank-num.top3 { color: #cd7f32; }
.rank-info { flex: 1; }
.rank-name { font-weight: 700; font-size: 15px; }
.rank-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.rank-val { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--green); font-size: 15px; }

/* ── TEACHER CARD ── */
.teacher-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.teacher-name { font-size: 18px; font-weight: 800; }
.teacher-pay { font-size: 12px; color: var(--text2); }
.teacher-stats { display: flex; gap: 16px; flex-wrap: wrap; }
.teacher-stat { text-align: center; }
.teacher-stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
.teacher-stat-label { font-size: 11px; color: var(--text3); }

/* ── MISC ── */
.empty-state { text-align: center; padding: 40px; color: var(--text3); }
.gap-12 { gap: 12px; }
.mb-16 { margin-bottom: 16px; }
.mt-16 { margin-top: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.flex-wrap { flex-wrap: wrap; }
.gap-8 { gap: 8px; }
hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.alert {
  padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 12px;
}
.alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
.alert-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }

.tab-row { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 7px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text2);
  border: 1px solid transparent; transition: all .2s;
}
.tab.active { background: var(--surface2); border-color: var(--border); color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">⚡ 武樂</div>
  <button class="nav-btn active" onclick="showPage('today')">📊 今日總覽</button>
  <button class="nav-btn" onclick="showPage('class')">📋 課程管理</button>
  <button class="nav-btn" onclick="showPage('teacher')">👩‍🏫 老師管理</button>
  <button class="nav-btn" onclick="showPage('student')">🎫 學員方案</button>
  <button class="nav-btn" onclick="showPage('monthly')">📅 月結報表</button>
  <div class="nav-spacer"></div>
  <button class="btn btn-secondary btn-sm" onclick="syncFromSheet()" id="syncBtn" style="font-size:12px;padding:5px 12px">🔄 同步試算表</button>
  <div class="nav-date" id="navDate" style="margin-left:8px"></div>
</nav>
<div id="syncToast" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.5)"></div>

<!-- ═══════════════════════════════════════════
     PAGE 1: 今日總覽
════════════════════════════════════════════ -->
<div class="page active" id="page-today">
  <div class="flex items-center justify-between flex-wrap gap-8 mb-16">
    <div>
      <div style="font-size:24px;font-weight:900;margin-bottom:4px">今日總覽</div>
      <div style="color:var(--text3);font-size:13px" id="todayDateLabel"></div>
    </div>
    <div class="flex gap-8 flex-wrap">
      <button class="btn btn-primary" onclick="openModal('addClassModal')">＋ 新增課程</button>
      <button class="btn btn-secondary" onclick="openModal('addPurchaseModal')">＋ 購買方案</button>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="grid-4" id="todayStats"></div>

  <!-- 課程列表 -->
  <div class="section-title">今日課程</div>
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>時間</th><th>課程</th><th>老師</th><th>教室</th>
            <th>預約/上限</th><th>到課</th><th>預約率</th><th>狀態</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="todayClassTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 預約率排行 -->
  <div class="grid-2 mt-16">
    <div class="card">
      <div class="card-title">📈 今日預約率排行</div>
      <div id="todayRankList"></div>
    </div>
    <div class="card">
      <div class="card-title">💰 今日購買明細</div>
      <div id="todayPurchaseList"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 2: 課程管理
════════════════════════════════════════════ -->
<div class="page" id="page-class">
  <div class="flex items-center justify-between flex-wrap gap-8 mb-16">
    <div style="font-size:24px;font-weight:900">課程管理</div>
    <div class="flex gap-8 flex-wrap">
      <label class="btn btn-secondary" style="cursor:pointer">
        📂 上傳 Excel 報表
        <input type="file" accept=".xlsx,.xls" style="display:none" onchange="importClassExcel(this)">
      </label>
      <button class="btn btn-primary" onclick="openModal('addClassModal')">＋ 新增課程</button>
    </div>
  </div>

  <div class="tab-row" id="classMonthTabs"></div>

  <div class="card">
    <div class="flex flex-wrap gap-8 mb-16" style="align-items:center">
      <select id="filterTeacher" onchange="renderClassTable()" style="min-width:120px">
        <option value="">全部老師</option>
      </select>
      <select id="filterStatus" onchange="renderClassTable()" style="min-width:120px">
        <option value="">全部狀態</option>
        <option value="正常">正常</option>
        <option value="停課">停課</option>
        <option value="滿班">滿班</option>
      </select>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)">
        排序：
        <select id="classSortBy" onchange="renderClassTable()" style="min-width:120px">
          <option value="date_desc">日期（新→舊）</option>
          <option value="date_asc">日期（舊→新）</option>
          <option value="rate_desc">預約率（高→低）</option>
          <option value="rate_asc">預約率（低→高）</option>
          <option value="booked_desc">預約人數（多→少）</option>
          <option value="attended_desc">到課人數（多→少）</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th><th>時間</th><th>課程名稱</th><th>老師</th><th>教室</th>
            <th>上限</th><th>預約</th><th>到課</th><th>預約率</th><th>狀態</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="classTableTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 3: 老師管理
════════════════════════════════════════════ -->
<div class="page" id="page-teacher">
  <div class="flex items-center justify-between flex-wrap gap-8 mb-16">
    <div style="font-size:24px;font-weight:900">老師管理</div>
    <button class="btn btn-primary" onclick="openModal('addTeacherModal')">＋ 新增老師</button>
  </div>

  <div class="tab-row" id="teacherMonthTabs"></div>
  <div id="teacherCardsContainer"></div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 4: 學員方案
════════════════════════════════════════════ -->
<div class="page" id="page-student">
  <div class="flex items-center justify-between flex-wrap gap-8 mb-16">
    <div style="font-size:24px;font-weight:900">學員方案</div>
    <button class="btn btn-primary" onclick="openModal('addPurchaseModal')">＋ 新增購買</button>
  </div>

  <div class="grid-4 mb-16" id="studentStats"></div>

  <div class="tab-row">
    <div class="tab active" onclick="switchStudentTab('all',this)">全部</div>
    <div class="tab" onclick="switchStudentTab('active',this)">有效中</div>
    <div class="tab" onclick="switchStudentTab('expireSoon',this)">⚠️ 即將到期</div>
    <div class="tab" onclick="switchStudentTab('expired',this)">已到期</div>
  </div>

  <div class="card">
    <div class="flex flex-wrap gap-8 mb-16">
      <input type="text" id="studentSearch" placeholder="搜尋學員姓名..." oninput="renderStudentTable()" style="min-width:180px">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>購買日期</th><th>學員</th><th>方案</th><th>金額</th>
            <th>啟用日期</th><th>到期日期</th><th>剩餘堂數</th><th>狀態</th><th>備註</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="studentTableTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 5: 月結報表
════════════════════════════════════════════ -->
<div class="page" id="page-monthly">
  <div class="flex items-center justify-between flex-wrap gap-8 mb-16">
    <div style="font-size:24px;font-weight:900">月結報表</div>
    <div class="flex gap-8">
      <select id="monthlyMonthSelect" onchange="renderMonthly()" style="min-width:140px"></select>
      <button class="btn btn-secondary" onclick="exportMonthly()">📄 匯出老師明細</button>
    </div>
  </div>

  <!-- 月份總覽 -->
  <div class="grid-4 mb-16" id="monthlyStats"></div>

  <!-- 老師費用明細 -->
  <div class="section-title">老師課費明細</div>
  <div class="card mb-16">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>老師</th><th>開課數</th><th>滿班數</th><th>總學生人次</th><th>預約率</th><th>課費/堂</th><th>滿班加給</th><th>滿額加給</th><th>課費小計</th></tr>
        </thead>
        <tbody id="monthlyTeacherTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 學員購買統計 -->
  <div class="section-title">學員購買統計</div>
  <div class="card mb-16">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>日期</th><th>學員</th><th>方案</th><th>金額</th></tr>
        </thead>
        <tbody id="monthlyPurchaseTbody"></tbody>
      </table>
    </div>
    <div style="text-align:right;margin-top:12px;font-size:15px;font-weight:700;color:var(--green)" id="monthlyPurchaseTotal"></div>
  </div>

  <!-- 月結摘要 -->
  <div class="section-title">月結摘要</div>
  <div class="card" id="monthlySummary"></div>
</div>

<!-- ═══════════════════════════════════════════
     MODALS
════════════════════════════════════════════ -->

<!-- 新增課程 -->
<div class="modal-overlay" id="addClassModal">
  <div class="modal">
    <div class="modal-title">新增課程</div>
    <div class="form-row">
      <div class="form-group" style="flex:1;min-width:130px">
        <label>課程日期</label>
        <input type="date" id="cls_date">
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label>開始時間</label>
        <input type="time" id="cls_timeStart" value="20:20">
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label>結束時間</label>
        <input type="time" id="cls_timeEnd" value="21:20">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2;min-width:150px">
        <label>課程名稱</label>
        <input type="text" id="cls_name" placeholder="如：基礎空瑜">
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label>授課老師</label>
        <select id="cls_teacher"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1;min-width:120px">
        <label>教室</label>
        <input type="text" id="cls_room" value="瑜伽教室">
      </div>
      <div class="form-group" style="flex:1;min-width:100px">
        <label>開課人數上限</label>
        <input type="number" id="cls_max" value="10" min="1">
      </div>
      <div class="form-group" style="flex:1;min-width:100px">
        <label>預約人數</label>
        <input type="number" id="cls_booked" value="0" min="0">
      </div>
      <div class="form-group" style="flex:1;min-width:100px">
        <label>到課人數</label>

<script>
// ═══════════════════════════════
//  DATA LAYER
// ═══════════════════════════════
const KEYS = { teachers:'studio_teachers', classes:'studio_classes', purchases:'studio_purchases' };

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

let teachers = load(KEYS.teachers);
let classes  = load(KEYS.classes);
let purchases = load(KEYS.purchases);

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// seed demo data if empty
function seedIfEmpty() {
  if (teachers.length === 0) {
    teachers = [
      { id: uid(), name: '塔塔', pay: 800, minPeople: 7, bonusMinPeople: 7, bonusPerPerson: 100, fullBonus: 100, note: '7人以上每人+$100，滿班+$100' },
      { id: uid(), name: 'Summer', pay: 900, minPeople: 5, bonusMinPeople: 0, bonusPerPerson: 0, fullBonus: 0, note: '' },
      { id: uid(), name: '小布', pay: 800, minPeople: 7, bonusMinPeople: 0, bonusPerPerson: 0, fullBonus: 100, note: '滿班+$100' },
      { id: uid(), name: 'Vanessa', pay: 1000, minPeople: 5, bonusMinPeople: 0, bonusPerPerson: 0, fullBonus: 0, note: '' },
      { id: uid(), name: '莊佳雯', pay: 700, minPeople: 5, bonusMinPeople: 0, bonusPerPerson: 0, fullBonus: 0, note: '' },
      { id: uid(), name: '小mo', pay: 800, minPeople: 5, bonusMinPeople: 0, bonusPerPerson: 0, fullBonus: 0, note: '' },
    ];
    save(KEYS.teachers, teachers);
  }
  if (classes.length === 0) {
    const today = todayStr();
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yd = yesterday.toISOString().slice(0,10);
    classes = [
      { id: uid(), date: today, timeStart:'09:30', timeEnd:'10:30', name:'內觀流', teacher:'Summer', room:'瑜伽教室', max:10, booked:7, attended:6, status:'正常', note:'' },
      { id: uid(), date: today, timeStart:'11:00', timeEnd:'12:00', name:'基礎空瑜', teacher:'小布', room:'瑜伽教室', max:7, booked:7, attended:7, status:'滿班', note:'' },
      { id: uid(), date: today, timeStart:'19:10', timeEnd:'20:10', name:'正位瑜伽', teacher:'小mo', room:'瑜伽教室', max:10, booked:3, attended:0, status:'正常', note:'' },
      { id: uid(), date: today, timeStart:'20:20', timeEnd:'21:20', name:'瑜伽輪療癒伸展', teacher:'Summer', room:'瑜伽教室', max:13, booked:4, attended:0, status:'正常', note:'' },
      { id: uid(), date: yd, timeStart:'20:20', timeEnd:'21:20', name:'基礎空瑜', teacher:'塔塔', room:'瑜伽教室', max:7, booked:7, attended:6, status:'滿班', note:'' },
      { id: uid(), date: yd, timeStart:'09:30', timeEnd:'10:30', name:'伸展舒緩樂瑜伽', teacher:'Summer', room:'瑜伽教室', max:10, booked:10, attended:9, status:'滿班', note:'' },
    ];
    save(KEYS.classes, classes);
  }
  if (purchases.length === 0) {
    const today = todayStr();
    purchases = [
      { id: uid(), date: today, student:'戴絲薇', plan:'武樂 5週年限定月卡(13堂)', amount: 2999, startDate: today, endDate:'2026-04-28', sessions:13, note:'' },
      { id: uid(), date: today, student:'戴絲薇', plan:'課程通用', amount: 0, startDate: today, endDate:'2026-04-28', sessions:0, note:'贈送' },
      { id: uid(), date: today, student:'楊淑媛', plan:'新手體驗包', amount: 1500, startDate: today, endDate:'2026-04-30', sessions:3, note:'' },
      { id: uid(), date: today, student:'楊淑媛', plan:'武樂 5週年限定堂數方案', amount: 11111, startDate: today, endDate:'2027-03-30', sessions:30, note:'' },
    ];
    save(KEYS.purchases, purchases);
  }
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '-';
  const [y,m,day] = d.split('-');
  return `${y}/${m}/${day}`;
}
function fmtMoney(n) { return '$' + Number(n).toLocaleString(); }

// ═══════════════════════════════
//  NAV
// ═══════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const idx = ['today','class','teacher','student','monthly'].indexOf(name);
  if (idx >= 0) btns[idx].classList.add('active');
  if (name==='today') renderToday();
  if (name==='class') renderClassPage();
  if (name==='teacher') renderTeacherPage();
  if (name==='student') renderStudentPage();
  if (name==='monthly') renderMonthlyPage();
}

// ═══════════════════════════════
//  MODALS
// ═══════════════════════════════
function openModal(id) {
  const m = document.getElementById(id);
  if (!m) return;
  // pre-fill dates
  if (id==='addClassModal') {
    document.getElementById('cls_date').value = todayStr();
    populateTeacherSelect('cls_teacher');
  }
  if (id==='addPurchaseModal') {
    document.getElementById('pur_date').value = todayStr();
    document.getElementById('pur_startDate').value = todayStr();
  }
  m.classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function populateTeacherSelect(selId) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = teachers.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
  if (cur) sel.value = cur;
}

// ═══════════════════════════════
//  CLASSES CRUD
// ═══════════════════════════════
function saveClass() {
  const c = {
    id: uid(),
    date: document.getElementById('cls_date').value,
    timeStart: document.getElementById('cls_timeStart').value,
    timeEnd: document.getElementById('cls_timeEnd').value,
    name: document.getElementById('cls_name').value.trim(),
    teacher: document.getElementById('cls_teacher').value,
    room: document.getElementById('cls_room').value.trim(),
    max: parseInt(document.getElementById('cls_max').value)||0,
    booked: parseInt(document.getElementById('cls_booked').value)||0,
    attended: parseInt(document.getElementById('cls_attended').value)||0,
    status: document.getElementById('cls_status').value,
    note: document.getElementById('cls_note').value.trim(),
  };
  if (!c.date || !c.name || !c.teacher) return alert('請填寫日期、課程名稱和老師');
  classes.push(c);
  save(KEYS.classes, classes);
  closeModal('addClassModal');
  refreshCurrentPage();
}

function editClass(id) {
  const c = classes.find(x=>x.id===id);
  if (!c) return;
  populateTeacherSelect('edit_cls_teacher');
  document.getElementById('edit_cls_id').value = c.id;
  document.getElementById('edit_cls_date').value = c.date;
  document.getElementById('edit_cls_timeStart').value = c.timeStart;
  document.getElementById('edit_cls_timeEnd').value = c.timeEnd;
  document.getElementById('edit_cls_name').value = c.name;
  document.getElementById('edit_cls_teacher').value = c.teacher;
  document.getElementById('edit_cls_room').value = c.room;
  document.getElementById('edit_cls_max').value = c.max;
  document.getElementById('edit_cls_booked').value = c.booked;
  document.getElementById('edit_cls_attended').value = c.attended;
  document.getElementById('edit_cls_status').value = c.status;
  document.getElementById('edit_cls_note').value = c.note;
  openModal('editClassModal');
}

function updateClass() {
  const id = document.getElementById('edit_cls_id').value;
  const idx = classes.findIndex(x=>x.id===id);
  if (idx<0) return;
  classes[idx] = {
    ...classes[idx],
    date: document.getElementById('edit_cls_date').value,
    timeStart: document.getElementById('edit_cls_timeStart').value,
    timeEnd: document.getElementById('edit_cls_timeEnd').value,
    name: document.getElementById('edit_cls_name').value.trim(),
    teacher: document.getElementById('edit_cls_teacher').value,
    room: document.getElementById('edit_cls_room').value.trim(),
    max: parseInt(document.getElementById('edit_cls_max').value)||0,
    booked: parseInt(document.getElementById('edit_cls_booked').value)||0,
    attended: parseInt(document.getElementById('edit_cls_attended').value)||0,
    status: document.getElementById('edit_cls_status').value,
    note: document.getElementById('edit_cls_note').value.trim(),
  };
  save(KEYS.classes, classes);
  closeModal('editClassModal');
  refreshCurrentPage();
}

function deleteClass(id) {
  if (!confirm('確定刪除這筆課程？')) return;
  classes = classes.filter(x=>x.id!==id);
  save(KEYS.classes, classes);
  closeModal('editClassModal');

function getPayGrid(prefix) {
  const grid = {};
  for (let i=1;i<=13;i++) {
    const v = parseInt(document.getElementById(`${prefix}p${i}`)?.value);
    if (!isNaN(v) && v>=0) grid[i] = v;
  }
  const vp = parseInt(document.getElementById(`${prefix}p14plus`)?.value);
  if (!isNaN(vp) && vp>=0) grid['14plus'] = vp;
  return grid;
}

function setPayGrid(prefix, grid) {
  for (let i=1;i<=13;i++) {
    const el = document.getElementById(`${prefix}p${i}`);
    if (el) el.value = grid?.[i] ?? '';
  }
  const elp = document.getElementById(`${prefix}p14plus`);
  if (elp) elp.value = grid?.['14plus'] ?? '';
}

function calcPayByGrid(teacher, attended) {
  if (!teacher.payGrid || Object.keys(teacher.payGrid).length === 0) {
    // 舊版相容
    return teacher.pay || 0;
  }
  const n = attended;
  if (teacher.payGrid[n] !== undefined) return teacher.payGrid[n];
  // 找最接近的較小人數
  let best = 0, bestPay = teacher.pay || 0;
  for (const k in teacher.payGrid) {
    if (k === '14plus') continue;
    const ki = parseInt(k);
    if (ki <= n && ki > best) { best = ki; bestPay = teacher.payGrid[k]; }
  }
  if (n >= 14 && teacher.payGrid['14plus'] !== undefined) return teacher.payGrid['14plus'];
  return bestPay;
}

function renderClassTable() {
  const tFilter = document.getElementById('filterTeacher').value;
  const sFilter = document.getElementById('filterStatus').value;

  const sortBy = document.getElementById('classSortBy')?.value || 'date_desc';
  const filtered = classes
    .filter(c => c.date.slice(0,7) === classPageMonth)
    .filter(c => !tFilter || c.teacher===tFilter)
    .filter(c => !sFilter || c.status===sFilter)
    .sort((a,b) => {
      const rateA = a.max>0?a.booked/a.max:0, rateB = b.max>0?b.booked/b.max:0;
      if (sortBy==='date_desc') return b.date.localeCompare(a.date)||a.timeStart.localeCompare(b.timeStart);
      if (sortBy==='date_asc')  return a.date.localeCompare(b.date)||a.timeStart.localeCompare(b.timeStart);
      if (sortBy==='rate_desc') return rateB-rateA;
      if (sortBy==='rate_asc')  return rateA-rateB;
      if (sortBy==='booked_desc') return b.booked-a.booked;
      if (sortBy==='attended_desc') return b.attended-a.attended;
      return 0;
    });

  const tbody = document.getElementById('classTableTbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="empty-state">本月無課程記錄</td></tr>`;
    return;

    if (c.status==='滿班') statusBadge = `<span class="badge badge-green">滿班</span>`;
    else if (c.status==='停課') statusBadge = `<span class="badge badge-red">停課</span>`;
    else if (underMinFlag) statusBadge = `<span class="badge badge-yellow">未達</span>`;

    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtDate(c.date)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${c.timeStart}–${c.timeEnd}</td>

      <td><button class="btn btn-secondary btn-sm" onclick="editClass('${c.id}')">編輯</button></td>
    </tr>`;
  }).join('');

// 複製老師明細給老師核對
function copyTeacherDetail(teacherId, month) {
  const t = teachers.find(x=>x.id===teacherId);
  if (!t) return;
  const allC = classes.filter(c=>c.teacher===t.name && c.date.slice(0,7)===month)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const activeC = allC.filter(c=>c.status!=='停課');
  const totalPay = activeC.reduce((s,c)=>s+calcTeacherPay(t,c),0);

  let payDesc = '';
  if (t.payGrid && Object.keys(t.payGrid).length > 0) {
    const entries = [];
    for (let i=1;i<=13;i++) { if (t.payGrid[i]!==undefined) entries.push(`${i}人 $${t.payGrid[i]}`); }
    if (t.payGrid['14plus']!==undefined) entries.push(`14人以上 $${t.payGrid['14plus']}`);
    payDesc = entries.join('、');
  } else { payDesc = `$${t.pay}/堂`; }

  let lines = [];
  lines.push(`【${month} 課費明細】${t.name} 老師`);
  lines.push(`課費：${payDesc}${t.fullBonus>0?' · 滿班+$'+t.fullBonus:''}`);
  lines.push(`開課數：${activeC.length}｜停課數：${allC.filter(c=>c.status==='停課').length}｜滿班數：${activeC.filter(c=>c.status==='滿班').length}`);
  lines.push('────────────────────');
  allC.forEach(c=>{
    const isCancelled = c.status==='停課';
    const pay = isCancelled ? 0 : (c.customPay!==undefined?c.customPay:calcTeacherPay(t,c));
    const rate = c.max>0?Math.round(c.booked/c.max*100):0;
    lines.push(`${fmtDate(c.date)} ${c.timeStart}  ${c.name}  到課${c.attended}人  預約率${isCancelled?'-':rate+'%'}  ${isCancelled?'停課（不計費）':'$'+pay}`);
  });
  lines.push('────────────────────');
  lines.push(`本月課費合計：$${totalPay}`);

  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    showToast('✅ 已複製！可直接貼給 '+t.name+' 老師', 'success');
  }).catch(()=>{
    showToast('❌ 複製失敗，請手動截圖', 'error');
  });
}

function switchStudentTab(tab, el) {
  _currentStudentTab = tab;
  document.querySelectorAll('#page-student .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderStudentTable();
}

function renderStudentPage() {
  const today = todayStr();
  const thisMonth = today.slice(0,7);
  const active = purchases.filter(p=>p.endDate>=today);
  const expired = purchases.filter(p=>p.endDate && p.endDate<today);
  const monthPurchases = purchases.filter(p=>p.date && p.date.slice(0,7)===thisMonth);
  const monthRevenue = monthPurchases.reduce((s,p)=>s+p.amount,0);
  const expireSoon = purchases.filter(p => {
    if (!p.endDate || p.endDate < today) return false;
    const daysLeft = Math.ceil((new Date(p.endDate) - new Date()) / 86400000);
    return daysLeft <= 14;
  });
  const now = new Date();
  const monthLabel = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;

  document.getElementById('studentStats').innerHTML = `
    <div class="stat-card gold">
      <div class="stat-num">${fmtMoney(monthRevenue)}</div>
      <div class="stat-label">本月方案營收</div>
      <div class="stat-sub">${monthLabel} · ${monthPurchases.length} 筆成交</div>
    </div>
    <div class="stat-card green"><div class="stat-num">${active.length}</div><div class="stat-label">有效方案數</div></div>
    <div class="stat-card yellow" style="border-top:3px solid var(--yellow)">
      <div class="stat-num" style="color:var(--yellow)">${expireSoon.length}</div>
      <div class="stat-label">14天內到期</div>
      <div class="stat-sub">需要續約</div>
    </div>
    <div class="stat-card red"><div class="stat-num">${expired.length}</div><div class="stat-label">已到期方案</div></div>
  `;
  renderStudentTable();
}

function renderStudentTable() {
  const today = todayStr();
  const keyword = document.getElementById('studentSearch').value.toLowerCase();
  let list = [...purchases].sort((a,b)=>b.date.localeCompare(a.date));

  if (_currentStudentTab === 'active') list = list.filter(p=>!p.endDate||p.endDate>=today);
  if (_currentStudentTab === 'expireSoon') list = list.filter(p => {
    if (!p.endDate || p.endDate < today) return false;
    const daysLeft = Math.ceil((new Date(p.endDate) - new Date()) / 86400000);
    return daysLeft <= 14;
  });
  if (_currentStudentTab === 'expired') list = list.filter(p=>p.endDate&&p.endDate<today);
  if (keyword) list = list.filter(p=>p.student.toLowerCase().includes(keyword)||p.plan.toLowerCase().includes(keyword));

  const tbody = document.getElementById('studentTableTbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty-state">無資料</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(p => {
    const isExpired = p.endDate && p.endDate < today;
    const expireSoon = p.endDate && !isExpired && (new Date(p.endDate)-new Date()) < 7*86400000;
    let status = '';
    if (!p.endDate) status = `<span class="badge badge-purple">無期限</span>`;
    else if (isExpired) status = `<span class="badge badge-red">已到期</span>`;
    else if (expireSoon) status = `<span class="badge badge-yellow">即將到期</span>`;
    else status = `<span class="badge badge-green">有效</span>`;
    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtDate(p.date)}</td>
      <td style="font-weight:600">${p.student}</td>
      <td>${p.plan}</td>
      <td style="font-family:'DM Mono',monospace;color:${p.amount===0?'var(--text3)':'var(--green)'}">${fmtMoney(p.amount)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtDate(p.startDate)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:${isExpired?'var(--red)':expireSoon?'var(--yellow)':'var(--text)'}">${fmtDate(p.endDate)}</td>
      <td style="text-align:center">${p.sessions||'–'}</td>
      <td>${status}</td>
      <td style="color:var(--text3);font-size:12px">${p.note||''}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="editPurchase('${p.id}')">編輯</button></td>
    </tr>`;
  }).join('');
}

function exportMonthly() {
  const month = document.getElementById('monthlyMonthSelect').value;

  a.href = URL.createObjectURL(blob);

const SHEET_ID = '1-DtjW2azPOspnc5XLbzGunN4sqMbkyDaErrXrEMUllQ';
const SHEET_NAME = '購買記錄';

function showToast(msg, type='success') {
  const el = document.getElementById('syncToast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type==='success' ? 'rgba(74,222,128,0.15)' : type==='error' ? 'rgba(248,113,113,0.15)' : 'rgba(124,111,205,0.15)';
  el.style.border = `1px solid ${type==='success'?'rgba(74,222,128,0.3)':type==='error'?'rgba(248,113,113,0.3)':'rgba(124,111,205,0.3)'}`;
  el.style.color = type==='success' ? 'var(--green)' : type==='error' ? 'var(--red)' : 'var(--accent2)';
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>{ el.style.display='none'; }, 3500);
}

async function syncFromSheet() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳ 同步中...';
  btn.disabled = true;

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('無法連線');
    const text = await res.text();

    // Google 回傳的格式是 google.visualization.Query.setResponse({...})
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    if (!rows || rows.length === 0) {
      showToast('試算表目前無資料', 'info');
      return;
    }

    let added = 0;
    let skipped = 0;

    rows.forEach(row => {
      const cols = row.c;
      if (!cols || !cols[0]) return;

      // 欄位順序：購買日期, 會員姓名, 方案名稱, 金額, 啟用日期, 到期日期, 方案時長, 堂數, 寫入時間
      const rawDate      = cols[0]?.v;
      const student      = cols[1]?.v?.toString().trim() || '';
      const plan         = cols[2]?.v?.toString().trim() || '';
      const amount       = parseInt(cols[3]?.v) || 0;
      const rawStartDate = cols[4]?.v;
      const rawEndDate   = cols[5]?.v;
      const sessions     = parseInt(cols[7]?.v) || 0;

      if (!student || !plan) return;

      // 轉換日期格式：Date(yyyy,mm,dd) 或 yyyy/MM/dd → yyyy-MM-dd
      function parseSheetDate(raw) {
        if (!raw) return '';
        if (typeof raw === 'string' && raw.startsWith('Date(')) {
          const parts = raw.replace('Date(','').replace(')','').split(',');
          return `${parts[0]}-${String(parseInt(parts[1])+1).padStart(2,'0')}-${String(parts[2]).padStart(2,'0')}`;
        }
        if (typeof raw === 'string') return raw.replace(/\//g, '-');
        return '';
      }

      const dateStr      = parseSheetDate(rawDate);
      const startDateStr = parseSheetDate(rawStartDate) || dateStr;
      const endDateStr   = parseSheetDate(rawEndDate);

      if (!dateStr) return;

      // 檢查是否已存在（同日期+學員+方案）
      const exists = purchases.some(p => p.date === dateStr && p.student === student && p.plan === plan);
      if (exists) { skipped++; return; }

      purchases.push({
        id: uid(),
        date: dateStr,
        student,
        plan,
        amount,
        startDate: startDateStr,
        endDate: endDateStr,
        sessions,
        note: '📥 試算表匯入',
      });
      added++;
    });

    save(KEYS.purchases, purchases);

    if (added > 0) {
      showToast(`✅ 同步完成！新增 ${added} 筆，跳過 ${skipped} 筆重複`, 'success');
    } else {
      showToast(`已是最新狀態（跳過 ${skipped} 筆重複）`, 'info');
    }

    refreshCurrentPage();

  } catch(e) {
    console.error(e);
    showToast('❌ 同步失敗，請確認試算表已設為公開', 'error');
  } finally {
    btn.textContent = '🔄 同步試算表';
    btn.disabled = false;
  }
}

// ═══════════════════════════════
//  匯入 BookFast Excel 報表
// ═══════════════════════════════
function importClassExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      // 動態載入 SheetJS
      if (!window.XLSX) {
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          s.onload=res; s.onerror=rej;
          document.head.appendChild(s);
        });
      }
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});

      // 找標題列（包含「課程日期」的那列）
      let headerIdx = -1;
      for (let i=0;i<rows.length;i++) {
        if (rows[i].some(c=>String(c).includes('課程日期'))) { headerIdx=i; break; }
      }
      if (headerIdx<0) { showToast('❌ 找不到課程資料，請確認是 BookFast 團體課報表', 'error'); return; }

      const headers = rows[headerIdx];
      const getCol = (name) => headers.findIndex(h=>String(h||'').includes(name));

      const colDate     = getCol('課程日期');
      const colTime     = getCol('課程時間');
      const colName     = getCol('課程名稱');
      const colStatus   = getCol('課程狀態');
      const colTeacher  = getCol('授課老師');
      const colMax      = getCol('開課名額');
      const colBooked   = getCol('預約總人數');
      const colAttended = getCol('到課總人數');

      let added=0, skipped=0;
      for (let i=headerIdx+1;i<rows.length;i++) {
        const row = rows[i];
        if (!row || !row[colDate]) continue;

        const rawDate = String(row[colDate]||'');
        const dateStr = rawDate.replace(/\//g,'-');
        if (!dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) continue;

        const rawTime  = String(row[colTime]||'');
        const timeParts = rawTime.split(/[~～\-]/);
        const timeStart = timeParts[0]?.trim()||'';
        const timeEnd   = timeParts[1]?.trim()||'';
        const name      = String(row[colName]||'').trim();
        const teacher   = String(row[colTeacher]||'').trim();
        const status    = String(row[colStatus]||'正常').trim();
        const max       = parseInt(row[colMax])||0;
        const booked    = parseInt(row[colBooked])||0;
        const attended  = parseInt(row[colAttended])||0;

        if (!name || !dateStr) continue;

        // 防重複
        const exists = classes.some(c=>c.date===dateStr&&c.timeStart===timeStart&&c.name===name);
        if (exists) { skipped++; continue; }

        classes.push({ id:uid(), date:dateStr, timeStart, timeEnd, name, teacher, room:'', max, booked, attended, status, note:'📂 Excel匯入' });
        added++;
      }

      save(KEYS.classes, classes);
      showToast(`✅ 匯入完成！新增 ${added} 筆，跳過 ${skipped} 筆重複`, 'success');
      renderClassPage();
    } catch(err) {
      console.error(err);
      showToast('❌ 匯入失敗：' + err.message, 'error');
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════
//  快速更新到課人數 & 課費
// ═══════════════════════════════
function updateClassAttended(classId, val) {
  const idx = classes.findIndex(c=>c.id===classId);
  if (idx<0) return;
  classes[idx].attended = parseInt(val)||0;
  save(KEYS.classes, classes);
}

function updateClassCustomPay(classId, val) {
  const idx = classes.findIndex(c=>c.id===classId);
  if (idx<0) return;
  classes[idx].customPay = parseInt(val)||0;
  save(KEYS.classes, classes);
  // 重新計算合計顯示
  renderTeacherPage();
}

// ═══════════════════════════════
//  REFRESH
// ═══════════════════════════════
function refreshCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id.replace('page-','');
  if (id==='today') renderToday();
  if (id==='class') renderClassPage();
  if (id==='teacher') renderTeacherPage();
  if (id==='student') renderStudentPage();
  if (id==='monthly') renderMonthlyPage();
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
function init() {
  seedIfEmpty();
  // update nav date
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('navDate').textContent =
    `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
  document.getElementById('todayDateLabel').textContent =
    `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日（星期${days[now.getDay()]}）`;
  renderToday();
  // 每次開啟自動同步一次
  setTimeout(syncFromSheet, 1200);
}

init();
